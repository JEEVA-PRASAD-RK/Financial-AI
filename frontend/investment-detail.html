<!DOCTYPE html>
<html lang="en">
<head>

<title>Investment Details — Finace</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--indigo:#4f46e5;--violet:#7c3aed;--indigo-light:#eef2ff;--indigo-mid:#c7d2fe;--sl50:#f8fafc;--sl100:#f1f5f9;--sl200:#e2e8f0;--sl300:#cbd5e1;--sl500:#64748b;--sl900:#0f172a;--green:#16a34a;--green-bg:#dcfce7;--green-bd:#86efac;--red:#dc2626;--red-bg:#fee2e2;--amber:#d97706;--amber-bg:#fef3c7;--white:#fff;--sh-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);--sh-md:0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04)}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--sl100);color:var(--sl900);overflow-x:hidden}
.layout{display:flex;min-height:100vh}
.sidebar{width:240px;flex-shrink:0;background:var(--white);border-right:1px solid var(--sl200);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;box-shadow:2px 0 8px rgba(0,0,0,.04);z-index:10}
.sb-brand{padding:22px 20px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--sl200)}
.sb-name{font-size:.95rem;font-weight:700;color:var(--sl900);line-height:1.2}
.sb-sub{font-size:.72rem;color:var(--sl500)}
.sb-nav{flex:1;padding:16px 12px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;font-size:.875rem;font-weight:500;color:var(--sl500);cursor:pointer;transition:all .18s;margin-bottom:4px;border:none;background:none;width:100%;text-align:left;font-family:'Inter',sans-serif;text-decoration:none}
.nav-item:hover{background:var(--sl100);color:var(--sl900)}
.nav-item.active{background:linear-gradient(135deg,var(--indigo),var(--violet));color:#fff;font-weight:600;box-shadow:0 4px 14px rgba(79,70,229,.35)}
.ni{font-size:1.1rem;width:22px;text-align:center;flex-shrink:0}
.sb-user{padding:16px;border-top:1px solid var(--sl200)}
.sb-user-row{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;background:var(--sl50);margin-bottom:8px}
.sb-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--indigo),var(--violet));display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#fff;flex-shrink:0}
.sb-uname{font-size:.83rem;font-weight:600;color:var(--sl900)}
.sb-uemail{font-size:.71rem;color:var(--sl500);word-break:break-all}
.sb-logout{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;font-size:.83rem;font-weight:500;color:var(--red);cursor:pointer;border:none;background:none;font-family:'Inter',sans-serif;width:100%;transition:background .15s}
.sb-logout:hover{background:var(--red-bg)}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow-y:auto}
.top-nav{background:var(--white);border-bottom:1px solid var(--sl200);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--sh-sm)}
.top-nav-title{font-size:1rem;font-weight:700;color:var(--sl900);display:flex;align-items:center;gap:10px}
.top-nav-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--indigo),var(--violet));display:flex;align-items:center;justify-content:center;font-size:.88rem;color:#fff}
.tb-back{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:8px;background:var(--indigo-light);border:1.5px solid var(--indigo-mid);color:var(--indigo);font-family:'Inter',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;text-decoration:none;transition:all .18s}
.tb-back:hover{background:var(--indigo-mid)}
.content{padding:28px 28px 60px;max-width:900px}

/* DETAIL STYLES */
.detail-hero{border-radius:20px;padding:32px;margin-bottom:28px;display:flex;align-items:center;gap:20px}
.detail-hero-icon{width:72px;height:72px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;background:rgba(255,255,255,.4);flex-shrink:0}
.detail-hero h1{font-family:'Sora',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:4px}
.detail-hero p{font-size:.88rem;opacity:.85}

.detail-section{background:var(--white);border:1px solid var(--sl200);border-radius:18px;padding:24px 28px;margin-bottom:18px;box-shadow:var(--sh-sm)}
.detail-section h2{font-size:1.05rem;font-weight:700;color:var(--sl900);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.detail-section h2 span{font-size:1.1rem}
.detail-section p,.detail-section li{font-size:.86rem;color:#374151;line-height:1.8}
.detail-section ul{padding-left:20px;margin-top:8px}
.detail-section li{margin-bottom:6px}
.detail-section strong{color:var(--sl900)}

.detail-info-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.detail-info-box{background:var(--sl50);border:1px solid var(--sl200);border-radius:14px;padding:16px 18px;text-align:center}
.detail-info-box .label{font-size:.7rem;font-weight:600;color:var(--sl500);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.detail-info-box .val{font-size:.95rem;font-weight:700;color:var(--sl900)}
.inv-risk{font-size:.7rem;font-weight:600;padding:3px 9px;border-radius:20px}
.risk-low{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.risk-med{background:var(--amber-bg);color:var(--amber);border:1px solid #fcd34d}
.risk-high{background:var(--red-bg);color:var(--red);border:1px solid #fca5a5}

.example-box{background:var(--indigo-light);border:1.5px solid var(--indigo-mid);border-radius:14px;padding:18px 22px;margin-top:14px}
.example-box h4{font-size:.86rem;font-weight:700;color:var(--indigo);margin-bottom:8px}
.example-box p{font-size:.82rem;color:#374151;line-height:1.7}

@media(max-width:860px){.sidebar{display:none}.content{padding:18px 14px}.detail-info-strip{grid-template-columns:1fr 1fr}}
@media(max-width:500px){.detail-info-strip{grid-template-columns:1fr}}
</style>
</head>

</div>
</div>

  silver:{name:'Silver',icon:'⬜',color:'#374151',bg:'linear-gradient(135deg,#f1f5f9,#e2e8f0)',textColor:'#1e293b',risk:'Medium',riskClass:'risk-med',returnRange:'6-14%',lockIn:'None',taxInfo:'LTCG 20% with indexation (>3yr)',

  bitcoin:{name:'Bitcoin',icon:'₿',color:'#d97706',bg:'linear-gradient(135deg,#fef3c7,#fcd34d)',textColor:'#92400e',risk:'High',riskClass:'risk-high',returnRange:'Variable (historically 50-200%)',lockIn:'None',taxInfo:'30% flat tax on gains + 1% TDS',

  'mutual-funds':{name:'Mutual Funds',icon:'📊',color:'#4f46e5',bg:'linear-gradient(135deg,#eef2ff,#c7d2fe)',textColor:'#312e81',risk:'Medium',riskClass:'risk-med',returnRange:'10-15% (equity)',lockIn:'None (ELSS: 3yr)',taxInfo:'LTCG >₹1L at 10%; STCG 15%',

  fd:{name:'Fixed Deposit',icon:'🏦',color:'#059669',bg:'linear-gradient(135deg,#dcfce7,#bbf7d0)',textColor:'#064e3b',risk:'Low',riskClass:'risk-low',returnRange:'6.5-7.5%',lockIn:'Flexible (Tax-saver: 5yr)',taxInfo:'Interest taxed per slab; TDS applies',
    intro:'Fixed Deposits (FDs) are the most popular and safest investment option in India. You deposit a lump sum for a fixed tenure at a predetermined interest rate. Banks, post offices, and NBFCs offer FDs.',
    howItWorks:'• **Regular FDs** — Choose tenure (7 days to 10 years). Interest rate fixed at time of deposit.\n• **Tax-Saver FDs** — 5-year lock-in. Up to ₹1.5 lakh qualifies for Section 80C.\n• **Senior Citizen FDs** — 0.25-0.75% higher interest rate for those 60+.\n• **Cumulative vs Non-cumulative** — Cumulative: interest reinvested. Non-cumulative: periodic payouts.\n• **FD Ladder Strategy** — Spread deposits across different tenures for liquidity + returns.',

  insurance:{name:'Insurance',icon:'🛡️',color:'#dc2626',bg:'linear-gradient(135deg,#fee2e2,#fecaca)',textColor:'#991b1b',risk:'Low',riskClass:'risk-low',returnRange:'4-8% (endowment)',lockIn:'Policy term',taxInfo:'80C deduction; 10(10D) maturity exempt',

    advantages:['Financial protection for family','Tax benefits under 80C and 80D','Term plans are very affordable','Health insurance covers rising medical costs','Loan facility on endowment policies','Group insurance through employers'],

  sip:{name:'SIP (Systematic Investment Plan)',icon:'📈',color:'#7c3aed',bg:'linear-gradient(135deg,#f3e8ff,#e9d5ff)',textColor:'#5b21b6',risk:'Medium',riskClass:'risk-med',returnRange:'12-15%',lockIn:'None (ELSS: 3yr)',taxInfo:'Same as mutual fund taxation',
    intro:'SIP is a method of investing in mutual funds where you invest a fixed amount at regular intervals (usually monthly). It harnesses two powerful concepts: rupee cost averaging and the power of compounding.',

    advantages:['Regular income stream — ideal for retirees','Tax-efficient vs FD interest','Remaining corpus keeps earning returns','Flexible — change withdrawal amount anytime','Better post-tax returns than traditional pensions','Capital can outlast you if managed well'],

      <div class="detail-info-box"><div class="label">Risk</div><div class="val"><span class="inv-risk ${d.riskClass}">${d.risk}</span></div></div>

    </div>

      <h2><span>⚙️</span> How It Works</h2>
      <div>${formatText(d.howItWorks)}</div>
    </div>

    </div>

    </div>

    <div class="detail-section">
      <h2><span>📌</span> Real-World Example</h2>
      <div class="example-box">
        <h4>Example Scenario</h4>
        <p>${formatText(d.example)}</p>
      </div>
    </div>`;
}

function formatText(t){
  return t.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/• /g,'<br>• ');
}

function loadSession(){
  try{const s=sessionStorage.getItem('ft_user');if(s){const u=JSON.parse(s);document.getElementById('sb-av').textContent=u.initials||'?';document.getElementById('sb-uname').textContent=u.fullName||u.name;document.getElementById('sb-uemail').textContent=u.email||'—';}}catch(_){}
}
function doLogout(){sessionStorage.removeItem('ft_user');sessionStorage.removeItem('ft_ob');window.location.href='index.html';}

document.addEventListener('DOMContentLoaded',()=>{loadSession();loadPage();});
</script>
</body>
</html>
